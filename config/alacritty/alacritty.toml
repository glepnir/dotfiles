[font]
size = 19
glyph_offset = { x = 0, y = 0 }
offset = { x = 0, y = 0 }

[font.normal]
family = "Lambda"
style = "Regular"

[font.bold]
family = "Lambda"
style = "Bold"

[font.bold_italic]
family = "Lambda"
style = "Bold Italic"

[font.italic]
family = "Lambda"
style = "Italic"

[window]
# opacity = 0.8
dynamic_padding = true
padding = {x = 2, y = 0}
decorations = "None"
option_as_alt = "OnlyLeft"

[mouse]
hide_when_typing = true

[cursor]
style = { shape ="Block", blinking = "Never" }

[keyboard]
bindings = [
  { key = "q", mode = "Vi", action = "ToggleViMode" },
  { key = "Return", mods = "Shift", chars = "\u001b[13;2u" },
]

[colors.primary]
background = "#1b1b1b"
foreground = "#b1b1b1"

[colors]
cursor = { cursor = '#a6e22e' }

[colors.normal]
black = "#586e75"
red = "#9a6a6a"
green = "#6a9a6a"
yellow = "#9a9a6a"
blue = "#7a8a9a"
cyan = "#6a9a9a"
magenta = "#9a6a9a"
white = "#8fa6ab"

[colors.bright]
yellow = "#ccad52"
