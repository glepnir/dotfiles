# ============================================================
# Terminal & Core
# ============================================================
set -g  default-terminal    "tmux-256color"
set -sa terminal-features   ",alacritty:RGB"
set -ga terminal-features   ",alacritty:usstyle"
set -as terminal-features   "*:extkeys"   # Shift+Enter etc.
set -g  extended-keys       on
set -g  allow-passthrough   on
set -s  focus-events        on
set -s  escape-time         0


# ============================================================
# General
# ============================================================
set -g  history-limit       10000
set -g  repeat-time         400
set -g  base-index          1
setw -g pane-base-index     1
setw -g automatic-rename    on
set -g  renumber-windows    on
set -g  set-titles          on
set -g  set-titles-string   '#h ❐ #S ● #I #W'


# ============================================================
# Activity
# ============================================================
setw -g monitor-activity    on
set -g  visual-activity     off


# ============================================================
# Status Bar
# ============================================================
set -g  status-interval     1
set -g  status              off


# ============================================================
# Key Bindings
# ============================================================
set -g  mode-keys           vi
set -g  prefix              C-Space
unbind  C-b

# --- Splits & Windows ---
unbind '"'
unbind %
bind i  split-window -h -c "#{pane_current_path}"
bind e  split-window -v -c "#{pane_current_path}"
bind q  kill-window
bind-key -n S-Enter send-keys "\e[13;2u"

# --- Pane Navigation ---
bind h  select-pane -L
bind j  select-pane -D
bind k  select-pane -U
bind l  select-pane -R

# --- Pane Resize ---
bind -r H  resize-pane -L 10
bind -r J  resize-pane -D 10
bind -r K  resize-pane -U 10
bind -r L  resize-pane -R 10

# --- Misc ---
bind r  source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind s  set-option -g status

# --- Debug Layout: full-height left pane + main pane below ---
bind m  new-window    -c "#{pane_current_path}" \;\
        rename-window 'debug' \;\
        split-window  -bfh -c "#{pane_current_path}" \;\
        select-pane   -D


# ============================================================
# Plugins
# ============================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'


# ============================================================
# Plugin: resurrect
# ============================================================
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim          'session'
set -g @resurrect-strategy-nvim         'session'


# ============================================================
# Plugin: continuum
# ============================================================
set -g @continuum-save-interval '15'


# ============================================================
# Plugin: prefix_highlight
# ============================================================
set -g @prefix_highlight_show_copy_mode  'on'
set -g @prefix_highlight_copy_mode_attr  'fg=white,bg=blue'


# ============================================================
# Initialize TPM (keep at bottom)
# ============================================================
run '~/.local/share/tmux/tpm/tpm'
